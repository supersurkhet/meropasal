name: Build Desktop & Mobile Apps

on:
  workflow_dispatch:
    inputs:
      build_desktop:
        description: 'Build desktop apps'
        type: boolean
        default: true
      build_mobile:
        description: 'Build mobile app'
        type: boolean
        default: true
  push:
    tags:
      - 'v*'

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'
      - run: bun install --frozen-lockfile
      - run: bun run --filter @meropasal/web build
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/.svelte-kit/output/client

  build-tauri:
    needs: build-web
    if: ${{ github.event_name == 'push' || inputs.build_desktop }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: apps/web/.svelte-kit/output/client

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: bun install --frozen-lockfile

      - name: Build Tauri app
        working-directory: apps/desktop
        run: bunx tauri build --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe

  build-android:
    needs: build-web
    if: ${{ github.event_name == 'push' || inputs.build_mobile }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: apps/web/.svelte-kit/output/client

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - run: bun install --frozen-lockfile

      - name: Add Android platform
        working-directory: apps/mobile
        run: |
          bunx cap add android || true
          bunx cap sync android

      - name: Build APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
